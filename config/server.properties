#Minecraft server properties
#Generated for TUS Minecraft Circle (仮)
#
# ⚠ online-mode=true のままにしてください
#   Floodgate が Bedrock プレイヤーの認証を肩代わりするため、
#   Java/Bedrock 両方でオンライン認証が機能します。
#
# ⚠ white-list=true のままにしてください
#   DiscordSRV 連携で Discord 認証済みユーザーのみを自動登録するため、
#   手動ホワイトリスト管理が不要になります。

server-name=TUS Minecraft Circle (仮)
motd=東京理科大学 MCサークル（仮） §aBE・スマホ対応あり
server-port=25565
max-players=20

# Java/Bedrock 両対応のため true のまま（Floodgate が BE 認証を処理）
online-mode=true

# Discord 認証連携のため true（DiscordSRV が自動登録）
white-list=true
enforce-whitelist=true

# 権限は LuckPerms で管理するため spawn-protection は無効
spawn-protection=0

difficulty=normal
gamemode=survival
force-gamemode=false
level-name=world
level-seed=
level-type=minecraft\:normal

pvp=true
enable-command-block=false
allow-flight=false

# 表示距離（VPS の性能に合わせて調整: 自宅Mac=10, 安いVPS=8）
view-distance=10
simulation-distance=8

# ネットワーク
network-compression-threshold=256
enable-rcon=false
enable-query=false

# パフォーマンス
max-tick-time=60000
sync-chunk-writes=true
use-native-transport=true
